<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kana Quest — Data Validator</title>
<style>
  :root {
    --bg: #0f0f1a;
    --panel: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #8892a0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --ok: #22c55e;
    --warn: #f59e0b;
    --err: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 16px;
    padding-top: 60px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; text-align: center; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; text-align: center; }
  .wrap { max-width: 1200px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    position: relative;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .char-big {
    font-size: 2rem;
    line-height: 1;
  }
  .char-meta {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: right;
  }
  .char-meta span { display: block; }
  .status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status.ok { background: rgba(34,197,94,0.15); color: var(--ok); }
  .status.warn { background: rgba(245,158,11,0.15); color: var(--warn); }
  .status.err { background: rgba(239,68,68,0.15); color: var(--err); }
  canvas {
    width: 100%;
    height: auto;
    aspect-ratio: 1;
    background: #0a0a14;
    border-radius: 8px;
    border: 1px solid var(--border);
    display: block;
  }
  .issues {
    margin-top: 8px;
    font-size: 0.75rem;
    color: var(--err);
    line-height: 1.5;
  }
  .issues:empty { display: none; }
  .summary {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .summary-item { text-align: center; }
  .summary-item .num { font-size: 1.8rem; font-weight: 700; display: block; }
  .summary-item .label { font-size: 0.75rem; color: var(--muted); }
  .summary-item.ok .num { color: var(--ok); }
  .summary-item.warn .num { color: var(--warn); }
  .summary-item.err .num { color: var(--err); }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: opacity .2s;
  }
  button:hover { opacity: .85; }
  button.secondary { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
  button.accent2 { background: var(--accent2); }
  .filter-group {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .hidden { display: none !important; }
  .back-link {
    position: fixed;
    top: 12px; left: 12px;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 10;
    background: rgba(15,15,26,0.8);
    padding: 6px 10px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }
  .back-link:hover { color: var(--text); }
  .back-link::before { content: "\2190"; font-size: 1.1rem; }
  @media (max-width: 600px) {
    h1 { font-size: 1.1rem; }
    .subtitle { font-size: 0.75rem; }
    .grid { grid-template-columns: 1fr; }
    .summary { gap: 16px; }
    .summary-item .num { font-size: 1.4rem; }
  }
</style>
<base target="_blank">
</head>
<body>

<a class="back-link" href="index.html">Back to Kana Quest</a>

<h1>Data Validator</h1>
<div class="subtitle">Preview & verify every character in data.js</div>

<div class="wrap">
  <div class="summary" id="summary">
    <div class="summary-item"><span class="num" id="totalCount">-</span><span class="label">Total</span></div>
    <div class="summary-item ok"><span class="num" id="okCount">-</span><span class="label">OK</span></div>
    <div class="summary-item warn"><span class="num" id="warnCount">-</span><span class="label">Warnings</span></div>
    <div class="summary-item err"><span class="num" id="errCount">-</span><span class="label">Errors</span></div>
  </div>

  <div class="controls">
    <button onclick="validateAll()">Run Validation</button>
    <button class="secondary" onclick="showAll()">Show All</button>
    <button class="secondary" onclick="showOnly('err')">Errors Only</button>
    <button class="secondary" onclick="showOnly('warn')">Warnings Only</button>
    <button class="accent2" onclick="exportReport()">Export Report</button>
  </div>

  <div class="filter-group">
    <button class="filter-btn active" onclick="filterType('all')">All</button>
    <button class="filter-btn" onclick="filterType('hiragana')">Hiragana</button>
    <button class="filter-btn" onclick="filterType('katakana')">Katakana</button>
    <button class="filter-btn" onclick="filterType('kanji')">Kanji</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script src="data.js"></script>
<script>
var validationResults = [];

function validateAll() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  validationResults = [];
  var ok = 0, warn = 0, err = 0;

  DATASET.forEach(function(entry, idx) {
    var issues = [];
    var status = 'ok';

    // Check required fields
    if (!entry.char) issues.push('Missing char');
    if (!entry.name) issues.push('Missing name');
    if (!entry.reading) issues.push('Missing reading');
    if (!entry.type) issues.push('Missing type');
    if (entry.expectedStrokes === undefined) issues.push('Missing expectedStrokes');

    // Check type validity
    var validTypes = ['hiragana', 'katakana', 'kanji'];
    if (entry.type && validTypes.indexOf(entry.type) === -1) {
      issues.push('Invalid type: ' + entry.type);
    }

    // Check refStrokes
    if (!entry.refStrokes || !Array.isArray(entry.refStrokes)) {
      issues.push('Missing or invalid refStrokes');
      status = 'err';
    } else {
      // Check stroke count matches
      if (entry.refStrokes.length !== entry.expectedStrokes) {
        issues.push('Stroke count mismatch: expected ' + entry.expectedStrokes + ', got ' + entry.refStrokes.length);
        status = 'warn';
      }

      // Check each stroke
      entry.refStrokes.forEach(function(stroke, si) {
        if (!Array.isArray(stroke) || stroke.length === 0) {
          issues.push('Stroke ' + (si+1) + ' is empty');
          status = 'err';
        } else {
          stroke.forEach(function(pt, pi) {
            if (typeof pt.x !== 'number' || typeof pt.y !== 'number') {
              issues.push('Stroke ' + (si+1) + ' point ' + (pi+1) + ' has invalid coordinates');
              status = 'err';
            }
            if (pt.x < 0 || pt.x > 280 || pt.y < 0 || pt.y > 280) {
              issues.push('Stroke ' + (si+1) + ' point ' + (pi+1) + ' out of bounds: (' + pt.x + ',' + pt.y + ')');
              status = 'warn';
            }
          });

          // Check for duplicate consecutive points
          for (var i = 1; i < stroke.length; i++) {
            if (stroke[i].x === stroke[i-1].x && stroke[i].y === stroke[i-1].y) {
              issues.push('Stroke ' + (si+1) + ' has duplicate consecutive points');
              status = 'warn';
            }
          }
        }
      });

      // Check for strokes that don't connect visually (large gaps between end and next start)
      for (var i = 1; i < entry.refStrokes.length; i++) {
        var prevEnd = entry.refStrokes[i-1][entry.refStrokes[i-1].length - 1];
        var currStart = entry.refStrokes[i][0];
        var dist = Math.sqrt(Math.pow(prevEnd.x - currStart.x, 2) + Math.pow(prevEnd.y - currStart.y, 2));
        if (dist > 80) {
          issues.push('Large gap between stroke ' + i + ' end and stroke ' + (i+1) + ' start (' + Math.round(dist) + 'px)');
          status = 'warn';
        }
      }
    }

    // Check for suspicious patterns
    if (entry.refStrokes && entry.refStrokes.length > 0) {
      // Check if all strokes are straight horizontal lines (suspicious for curved characters)
      var allHorizontal = entry.refStrokes.every(function(s) {
        return s.every(function(p) { return Math.abs(p.y - s[0].y) < 5; });
      });
      if (allHorizontal && entry.refStrokes.length > 1) {
        issues.push('All strokes are horizontal — may be incorrect for ' + entry.type);
        status = 'warn';
      }

      // Check if character is mostly straight lines when it should curve
      var hasCurve = entry.refStrokes.some(function(s) {
        return s.some(function(p, i) {
          if (i < 2) return false;
          var dx1 = s[i-1].x - s[i-2].x, dy1 = s[i-1].y - s[i-2].y;
          var dx2 = p.x - s[i-1].x, dy2 = p.y - s[i-1].y;
          var angle = Math.abs(Math.atan2(dy2, dx2) - Math.atan2(dy1, dx1));
          return angle > 0.3 && angle < Math.PI - 0.3;
        });
      });
      if (!hasCurve && entry.type === 'hiragana' && entry.expectedStrokes > 2) {
        issues.push('No curved strokes detected — hiragana typically has curves');
        status = 'warn';
      }
    }

    if (issues.length === 0) ok++;
    else if (status === 'warn') warn++;
    else err++;

    validationResults.push({ entry: entry, issues: issues, status: status, idx: idx });

    // Create card
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.type = entry.type;
    card.dataset.status = status;

    var header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = '<span class="char-big">' + entry.char + '</span>' +
      '<div class="char-meta">' +
      '<span>' + entry.name + '</span>' +
      '<span>' + entry.reading + ' &middot; ' + entry.type + '</span>' +
      '<span>' + entry.expectedStrokes + ' strokes</span>' +
      '</div>';

    var statusBadge = document.createElement('span');
    statusBadge.className = 'status ' + status;
    statusBadge.textContent = status;
    header.appendChild(statusBadge);
    card.appendChild(header);

    // Canvas
    var cvs = document.createElement('canvas');
    cvs.width = 280;
    cvs.height = 280;
    drawCharacter(cvs, entry);
    card.appendChild(cvs);

    // Issues
    if (issues.length > 0) {
      var issDiv = document.createElement('div');
      issDiv.className = 'issues';
      issDiv.innerHTML = issues.map(function(i) { return '&middot; ' + i; }).join('<br>');
      card.appendChild(issDiv);
    }

    grid.appendChild(card);
  });

  document.getElementById('totalCount').textContent = DATASET.length;
  document.getElementById('okCount').textContent = ok;
  document.getElementById('warnCount').textContent = warn;
  document.getElementById('errCount').textContent = err;
}

function drawCharacter(canvas, entry) {
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  // Background
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(6,182,212,0.1)';
  ctx.lineWidth = 1;
  for (var i = 0; i <= W; i += 40) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
  }
  for (var i = 0; i <= H; i += 40) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(6,182,212,0.2)';
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();

  if (!entry.refStrokes) return;

  entry.refStrokes.forEach(function(stroke, si) {
    if (!stroke || stroke.length === 0) return;

    // Draw stroke path
    ctx.beginPath();
    ctx.strokeStyle = '#7c3aed';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    stroke.forEach(function(p, i) {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();

    // Start dot
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.arc(stroke[0].x, stroke[0].y, 3, 0, Math.PI * 2);
    ctx.fill();

    // End dot
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(stroke[stroke.length - 1].x, stroke[stroke.length - 1].y, 3, 0, Math.PI * 2);
    ctx.fill();

    // Stroke number
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(si + 1, stroke[0].x, stroke[0].y - 6);
  });
}

function showAll() {
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('hidden'); });
}

function showOnly(status) {
  document.querySelectorAll('.card').forEach(function(c) {
    c.classList.toggle('hidden', c.dataset.status !== status);
  });
}

function filterType(type) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');

  document.querySelectorAll('.card').forEach(function(c) {
    if (type === 'all') {
      c.classList.remove('hidden');
    } else {
      c.classList.toggle('hidden', c.dataset.type !== type);
    }
  });
}

function exportReport() {
  var report = validationResults.map(function(r) {
    return {
      char: r.entry.char,
      name: r.entry.name,
      reading: r.entry.reading,
      type: r.entry.type,
      expectedStrokes: r.entry.expectedStrokes,
      actualStrokes: r.entry.refStrokes ? r.entry.refStrokes.length : 0,
      status: r.status,
      issues: r.issues
    };
  });

  var blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'validation-report.json';
  a.click();
  URL.revokeObjectURL(url);
}

// Auto-run on load
window.onload = validateAll;
</script>
</body>
</html>
